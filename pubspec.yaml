name: demo_list_getx
description: "A project demo CRUD use GetX to state management"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  flutter_svg: ^2.2.4
  easy_localization: ^3.0.7
  crypto: ^3.0.3
  cryptography: ^2.9.0
  flutter_keyboard_visibility: ^6.0.0
  flutter_secure_storage: ^9.2.2
  dio: ^5.9.2
  curl_logger_dio_interceptor: ^1.0.1
  bot_toast: ^4.1.3
  cached_network_image: ^3.4.1
  validators: ^3.0.0
  image_picker: ^1.2.1
  firebase_storage: ^13.3.0
  firebase_core: ^4.7.0
  get: ^4.7.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  injectable_generator: ^2.12.1
  build_runner: ^2.12.2
  flutter_gen_runner: ^5.13.0+1

flutter_gen:
  output: lib/generated/
  line_length: 150

  integrations:
    flutter_svg: true
    lottie: true

flutter:
  uses-material-design: true
  assets:
    - assets/svgs/
    - assets/translations/
